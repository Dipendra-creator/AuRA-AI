# ─── Aura AI — electron-builder configuration ────────────────────────────────
# Docs: https://www.electron.build/configuration/configuration

appId: com.aura-ai.desktop
productName: Aura AI

# ─── Deep-link protocol (OAuth callback redirect) ────────────────────────────
protocols:
  - name: Aura AI
    schemes:
      - aura-ai

directories:
  buildResources: build

# ─── Files included in the ASAR ──────────────────────────────────────────────
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

# ─── ASAR unpacking — resources accessed at runtime ─────────────────────────
asarUnpack:
  - resources/**

# ─── Extra resources bundled alongside the ASAR ──────────────────────────────
#   <app>.app/Contents/Resources/bin/aura-api
# At runtime: path.join(process.resourcesPath, 'bin', 'aura-api')

# ─── macOS ───────────────────────────────────────────────────────────────────
mac:
  x64ArchFiles: "**/node_modules/@napi-rs/**"
  extraResources:
    - from: backend/bin/aura-api-darwin-universal
      to: bin/aura-api
    # Bundle .env for first-run config seeding (GitHub OAuth, API keys, etc.)
    - from: backend/.env
      to: .env
      filter:
        - "**/*"
  # Universal binary: runs natively on Apple Silicon (M1→M5) AND Intel Macs
  target:
    - target: dmg
      arch:
        - universal   # fat binary embedding arm64 + x86_64
    - target: pkg
      arch:
        - universal   # PKG installer — runs postinstall script for deps
    - target: zip
      arch:
        - universal   # for Squirrel auto-update

  # App metadata
  category: public.app-category.productivity
  icon: build/icon.icns

  # Code signing & Gatekeeper
  hardenedRuntime: true      # required for notarisation
  gatekeeperAssess: false    # skip local Gatekeeper re-assessment during build
  notarize: false            # ← set to true + add credentials for distribution

  # Privacy usage strings (required by macOS if the permission is requested)
  extendInfo:
    - NSCameraUsageDescription: Aura AI requests access to the camera for document scanning.
    - NSMicrophoneUsageDescription: Aura AI requests access to the microphone.
    - NSDocumentsFolderUsageDescription: Aura AI requests access to the Documents folder to import files.
    - NSDownloadsFolderUsageDescription: Aura AI requests access to the Downloads folder to import files.

  # Entitlements
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

# ─── DMG installer ───────────────────────────────────────────────────────────
dmg:
  artifactName: ${productName}-${version}.${ext}
  title: Aura AI ${version}

# ─── PKG installer (macOS — includes postinstall for OCR + MongoDB) ──────────
pkg:
  scripts: build/pkg-scripts
  installLocation: /Applications
  isRelocatable: false

# ─── Windows (unchanged) ─────────────────────────────────────────────────────
win:
  target: nsis
  executableName: aura-ai
  extraResources:
    - from: backend/bin/aura-api-windows-amd64.exe
      to: bin/aura-api.exe
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh

# ─── Linux (unchanged) ───────────────────────────────────────────────────────
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
  extraResources:
    - from: backend/bin/aura-api-linux-amd64
      to: bin/aura-api
appImage:
  artifactName: ${name}-${version}.${ext}

# ─── Misc ────────────────────────────────────────────────────────────────────
npmRebuild: false
publish:
  provider: github
