<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80" width="900" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#070b14"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21d5ed"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#21d5ed"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
    @keyframes twinkle{0%,100%{opacity:.1;r:0.8}50%{opacity:.7;r:1.5}}
    .star{animation:twinkle 3s ease-in-out infinite}
    text{font-family:'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif}
  </style>

  <rect width="900" height="80" fill="url(#bg)" rx="12"/>

  <!-- Top accent line -->
  <line x1="200" y1="8" x2="700" y2="8" stroke="url(#tg)" stroke-width="1" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.15;0.5;0.15" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Stars -->
  <circle cx="120" cy="25" r="1" fill="#21d5ed" class="star"/>
  <circle cx="300" cy="18" r="0.8" fill="#a855f7" class="star" style="animation-delay:0.5s"/>
  <circle cx="550" cy="22" r="1" fill="#21d5ed" class="star" style="animation-delay:1s"/>
  <circle cx="780" cy="20" r="0.8" fill="#c084fc" class="star" style="animation-delay:1.5s"/>

  <!-- Heart -->
  <text x="450" y="45" text-anchor="middle" font-size="14" fill="#fb7185" filter="url(#g)">
    ❤️
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Text -->
  <text x="450" y="65" text-anchor="middle" font-size="12" fill="#94a3b8" font-weight="300" letter-spacing="1">
    Built with love by the AuRA AI team
  </text>

  <!-- Bottom accent -->
  <line x1="350" y1="72" x2="550" y2="72" stroke="url(#tg)" stroke-width="0.5" stroke-opacity="0.2">
    <animate attributeName="stroke-opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>
