<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21d5ed"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#21d5ed"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21d5ed"/>
      <stop offset="40%" stop-color="#67e8f9"/>
      <stop offset="60%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21d5ed" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#21d5ed" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="orbGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#21d5ed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#21d5ed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes float3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
    @keyframes pulseSmall { 0%,100%{opacity:0.2} 50%{opacity:0.7} }
    @keyframes shimmer { 0%{opacity:0.3} 50%{opacity:0.9} 100%{opacity:0.3} }
    @keyframes orbit { 0%{transform:rotate(0deg) translateX(120px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(120px) rotate(-360deg)} }
    @keyframes orbit2 { 0%{transform:rotate(0deg) translateX(90px) rotate(0deg)} 100%{transform:rotate(-360deg) translateX(90px) rotate(360deg)} }
    @keyframes dash { 0%{stroke-dashoffset:200} 100%{stroke-dashoffset:0} }
    @keyframes fadeInUp { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes borderPulse { 0%,100%{stroke-opacity:0.3} 50%{stroke-opacity:0.8} }
    @keyframes gridPulse { 0%,100%{opacity:0.03} 50%{opacity:0.08} }
    @keyframes starTwinkle { 0%,100%{opacity:0.1;r:1} 50%{opacity:0.8;r:2} }
    @keyframes glowPulse { 0%,100%{opacity:0.15} 50%{opacity:0.4} }
    .particle { animation: pulse 3s ease-in-out infinite; }
    .particle-delay1 { animation-delay: 0.5s; }
    .particle-delay2 { animation-delay: 1s; }
    .particle-delay3 { animation-delay: 1.5s; }
    .particle-delay4 { animation-delay: 2s; }
    .floating1 { animation: float1 6s ease-in-out infinite; }
    .floating2 { animation: float2 5s ease-in-out infinite; animation-delay: 1s; }
    .floating3 { animation: float3 7s ease-in-out infinite; animation-delay: 0.5s; }
    .grid-line { animation: gridPulse 4s ease-in-out infinite; }
    .star { animation: starTwinkle 3s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bgGrad)" rx="16"/>

  <!-- Outer border glow -->
  <rect x="1" y="1" width="898" height="318" rx="16" fill="none" stroke="url(#glowGrad)" stroke-width="1.5" stroke-opacity="0.4">
    <animate attributeName="stroke-opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Grid pattern -->
  <g class="grid-line">
    <line x1="0" y1="80" x2="900" y2="80" stroke="#21d5ed" stroke-opacity="0.04" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#21d5ed" stroke-opacity="0.04" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#21d5ed" stroke-opacity="0.04" stroke-width="0.5"/>
    <line x1="225" y1="0" x2="225" y2="320" stroke="#21d5ed" stroke-opacity="0.04" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="320" stroke="#21d5ed" stroke-opacity="0.04" stroke-width="0.5"/>
    <line x1="675" y1="0" x2="675" y2="320" stroke="#21d5ed" stroke-opacity="0.04" stroke-width="0.5"/>
  </g>

  <!-- Background orbs -->
  <circle cx="200" cy="160" r="130" fill="url(#orbGlow1)" class="floating1">
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="140" r="100" fill="url(#orbGlow2)" class="floating2">
    <animate attributeName="opacity" values="0.1;0.35;0.1" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Stars/particles background -->
  <circle cx="80" cy="50" r="1.2" fill="#21d5ed" class="star"/>
  <circle cx="150" cy="90" r="0.8" fill="#a855f7" class="star" style="animation-delay:0.5s"/>
  <circle cx="250" cy="40" r="1" fill="#21d5ed" class="star" style="animation-delay:1s"/>
  <circle cx="380" cy="70" r="0.7" fill="#67e8f9" class="star" style="animation-delay:1.5s"/>
  <circle cx="520" cy="35" r="1.1" fill="#a855f7" class="star" style="animation-delay:0.8s"/>
  <circle cx="620" cy="80" r="0.9" fill="#21d5ed" class="star" style="animation-delay:2s"/>
  <circle cx="750" cy="55" r="1" fill="#c084fc" class="star" style="animation-delay:0.3s"/>
  <circle cx="830" cy="45" r="0.6" fill="#21d5ed" class="star" style="animation-delay:1.2s"/>
  <circle cx="100" cy="250" r="0.8" fill="#a855f7" class="star" style="animation-delay:2.2s"/>
  <circle cx="300" cy="280" r="1" fill="#21d5ed" class="star" style="animation-delay:0.7s"/>
  <circle cx="500" cy="270" r="0.7" fill="#c084fc" class="star" style="animation-delay:1.8s"/>
  <circle cx="700" cy="260" r="0.9" fill="#21d5ed" class="star" style="animation-delay:1.3s"/>
  <circle cx="820" cy="280" r="0.8" fill="#a855f7" class="star" style="animation-delay:0.6s"/>

  <!-- Central diamond shape -->
  <g filter="url(#softGlow)" class="floating3">
    <polygon points="450,85 470,110 450,135 430,110" fill="none" stroke="url(#glowGrad)" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="450,92 462,110 450,128 438,110" fill="url(#glowGrad)" opacity="0.15">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Main title "AuRA AI" -->
  <text x="450" y="178" text-anchor="middle" font-family="'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif" font-size="56" font-weight="800" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="4">
    AuRA AI
  </text>

  <!-- Subtitle -->
  <text x="450" y="215" text-anchor="middle" font-family="'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif" font-size="15" fill="#94a3b8" letter-spacing="6" font-weight="300">
    INTELLIGENT DOCUMENT PROCESSING
  </text>

  <!-- Accent line below subtitle -->
  <line x1="300" y1="235" x2="600" y2="235" stroke="url(#accentLine)" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Tech badges -->
  <g font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="10" fill="#64748b" letter-spacing="2">
    <text x="450" y="262" text-anchor="middle">
      ELECTRON  ·  REACT  ·  TYPESCRIPT  ·  GO  ·  MONGODB
    </text>
  </g>

  <!-- Version badge -->
  <g class="floating2">
    <rect x="395" y="275" width="110" height="22" rx="11" fill="#1e293b" stroke="#21d5ed" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="450" y="290" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="10" fill="#21d5ed" opacity="0.8">v1.0.0-beta</text>
  </g>

  <!-- Floating particles -->
  <circle cx="120" cy="150" r="2" fill="#21d5ed" class="particle floating1" opacity="0.5"/>
  <circle cx="780" cy="180" r="2.5" fill="#a855f7" class="particle particle-delay1 floating2" opacity="0.4"/>
  <circle cx="320" cy="100" r="1.5" fill="#67e8f9" class="particle particle-delay2 floating3" opacity="0.6"/>
  <circle cx="580" cy="120" r="1.8" fill="#c084fc" class="particle particle-delay3 floating1" opacity="0.4"/>
  <circle cx="680" cy="200" r="2" fill="#21d5ed" class="particle particle-delay4 floating2" opacity="0.5"/>
  <circle cx="200" cy="220" r="1.5" fill="#a855f7" class="particle floating3" opacity="0.3"/>

  <!-- Corner accents -->
  <path d="M16,40 L16,16 L40,16" fill="none" stroke="#21d5ed" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M860,16 L884,16 L884,40" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite" begin="1s"/>
  </path>
  <path d="M16,280 L16,304 L40,304" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite" begin="2s"/>
  </path>
  <path d="M860,304 L884,304 L884,280" fill="none" stroke="#21d5ed" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round">
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite" begin="3s"/>
  </path>
</svg>
