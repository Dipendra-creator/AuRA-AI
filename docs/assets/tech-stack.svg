<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#070b14"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21d5ed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes orbitSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes ringPulse{0%,100%{stroke-opacity:.15;r:42}50%{stroke-opacity:.4;r:44}}
    @keyframes dotOrbit{0%{transform:rotate(0deg) translateX(46px)}100%{transform:rotate(360deg) translateX(46px)}}
    @keyframes dotOrbitRev{0%{transform:rotate(0deg) translateX(46px)}100%{transform:rotate(-360deg) translateX(46px)}}
    @keyframes connPulse{0%,100%{stroke-opacity:.15}50%{stroke-opacity:.5}}
    .card{animation:pulse 4s ease-in-out infinite}
    .float{animation:float 4s ease-in-out infinite}
    .ring{animation:ringPulse 3s ease-in-out infinite}
    .conn{animation:connPulse 3s ease-in-out infinite}
    text{font-family:'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif}
    .mono{font-family:'SF Mono','Fira Code','Cascadia Code',monospace}
  </style>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="14"/>
  <rect x="1" y="1" width="898" height="198" rx="14" fill="none" stroke="url(#tg)" stroke-width="0.5" stroke-opacity="0.12">
    <animate attributeName="stroke-opacity" values="0.08;0.2;0.08" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Title -->
  <text x="450" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="url(#tg)" letter-spacing="3" filter="url(#glow)">TECH STACK</text>

  <!-- ═══ TECH CARDS ═══ -->

  <!-- Connection lines between all cards -->
  <line x1="135" y1="105" x2="255" y2="105" stroke="#334155" stroke-width="0.8" class="conn"/>
  <line x1="315" y1="105" x2="375" y2="105" stroke="#334155" stroke-width="0.8" class="conn" style="animation-delay:0.3s"/>
  <line x1="435" y1="105" x2="495" y2="105" stroke="#334155" stroke-width="0.8" class="conn" style="animation-delay:0.6s"/>
  <line x1="555" y1="105" x2="615" y2="105" stroke="#334155" stroke-width="0.8" class="conn" style="animation-delay:0.9s"/>
  <line x1="675" y1="105" x2="735" y2="105" stroke="#334155" stroke-width="0.8" class="conn" style="animation-delay:1.2s"/>

  <!-- 1. Electron -->
  <g class="float">
    <circle cx="90" cy="100" r="42" fill="#111b2e" stroke="#47b8e0" stroke-width="1" class="ring"/>
    <circle cx="90" cy="100" r="32" fill="#0c1928"/>
    <text x="90" y="96" text-anchor="middle" font-size="22">⚡</text>
    <text x="90" y="112" text-anchor="middle" font-size="7" font-weight="700" fill="#47b8e0">Electron</text>
    <text x="90" y="155" text-anchor="middle" font-size="8" fill="#64748b" class="mono">v39.2</text>
    <text x="90" y="168" text-anchor="middle" font-size="7" fill="#475569">Desktop Shell</text>
    <!-- Orbiting dot -->
    <circle r="2.5" fill="#47b8e0" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 90 100" to="360 90 100" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="136;136" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;100" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 2. React -->
  <g class="float" style="animation-delay:0.5s">
    <circle cx="210" cy="100" r="42" fill="#111b2e" stroke="#61dafb" stroke-width="1" class="ring" style="animation-delay:0.5s"/>
    <circle cx="210" cy="100" r="32" fill="#0c1928"/>
    <text x="210" y="96" text-anchor="middle" font-size="22">⚛️</text>
    <text x="210" y="112" text-anchor="middle" font-size="7" font-weight="700" fill="#61dafb">React</text>
    <text x="210" y="155" text-anchor="middle" font-size="8" fill="#64748b" class="mono">v19</text>
    <text x="210" y="168" text-anchor="middle" font-size="7" fill="#475569">UI Framework</text>
    <!-- Orbiting dot -->
    <circle r="2.5" fill="#61dafb" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 210 100" to="-360 210 100" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="256;256" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;100" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 3. TypeScript -->
  <g class="float" style="animation-delay:1s">
    <circle cx="330" cy="100" r="42" fill="#111b2e" stroke="#3178c6" stroke-width="1" class="ring" style="animation-delay:1s"/>
    <circle cx="330" cy="100" r="32" fill="#0c1928"/>
    <text x="330" y="98" text-anchor="middle" font-size="16" font-weight="900" fill="#3178c6">TS</text>
    <text x="330" y="112" text-anchor="middle" font-size="7" font-weight="700" fill="#3178c6">TypeScript</text>
    <text x="330" y="155" text-anchor="middle" font-size="8" fill="#64748b" class="mono">v5.9</text>
    <text x="330" y="168" text-anchor="middle" font-size="7" fill="#475569">Type Safety</text>
    <circle r="2.5" fill="#3178c6" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 330 100" to="360 330 100" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="376;376" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;100" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 4. Vite -->
  <g class="float" style="animation-delay:1.5s">
    <circle cx="450" cy="100" r="42" fill="#111b2e" stroke="#bd34fe" stroke-width="1" class="ring" style="animation-delay:1.5s"/>
    <circle cx="450" cy="100" r="32" fill="#0c1928"/>
    <text x="450" y="96" text-anchor="middle" font-size="22">⚡</text>
    <text x="450" y="112" text-anchor="middle" font-size="7" font-weight="700" fill="#bd34fe">electron-vite</text>
    <text x="450" y="155" text-anchor="middle" font-size="8" fill="#64748b" class="mono">v5.0</text>
    <text x="450" y="168" text-anchor="middle" font-size="7" fill="#475569">Build Tool</text>
    <circle r="2.5" fill="#bd34fe" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 450 100" to="-360 450 100" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="496;496" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;100" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 5. Go -->
  <g class="float" style="animation-delay:2s">
    <circle cx="570" cy="100" r="42" fill="#111b2e" stroke="#00add8" stroke-width="1" class="ring" style="animation-delay:2s"/>
    <circle cx="570" cy="100" r="32" fill="#0c1928"/>
    <text x="570" y="98" text-anchor="middle" font-size="16" font-weight="900" fill="#00add8">Go</text>
    <text x="570" y="112" text-anchor="middle" font-size="7" font-weight="700" fill="#00add8">Golang</text>
    <text x="570" y="155" text-anchor="middle" font-size="8" fill="#64748b" class="mono">v1.25</text>
    <text x="570" y="168" text-anchor="middle" font-size="7" fill="#475569">API Server</text>
    <circle r="2.5" fill="#00add8" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 570 100" to="360 570 100" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="616;616" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;100" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 6. MongoDB -->
  <g class="float" style="animation-delay:2.5s">
    <circle cx="690" cy="100" r="42" fill="#111b2e" stroke="#00ed64" stroke-width="1" class="ring" style="animation-delay:2.5s"/>
    <circle cx="690" cy="100" r="32" fill="#0c1928"/>
    <text x="690" y="96" text-anchor="middle" font-size="22">🍃</text>
    <text x="690" y="112" text-anchor="middle" font-size="7" font-weight="700" fill="#00ed64">MongoDB</text>
    <text x="690" y="155" text-anchor="middle" font-size="8" fill="#64748b" class="mono">v7</text>
    <text x="690" y="168" text-anchor="middle" font-size="7" fill="#475569">Database</text>
    <circle r="2.5" fill="#00ed64" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 690 100" to="-360 690 100" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="736;736" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;100" dur="6.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 7. WebSocket -->
  <g class="float" style="animation-delay:3s">
    <circle cx="810" cy="100" r="42" fill="#111b2e" stroke="#f59e0b" stroke-width="1" class="ring" style="animation-delay:3s"/>
    <circle cx="810" cy="100" r="32" fill="#0c1928"/>
    <text x="810" y="96" text-anchor="middle" font-size="22">📡</text>
    <text x="810" y="112" text-anchor="middle" font-size="7" font-weight="700" fill="#fbbf24">WebSocket</text>
    <text x="810" y="155" text-anchor="middle" font-size="8" fill="#64748b" class="mono">gorilla/ws</text>
    <text x="810" y="168" text-anchor="middle" font-size="7" fill="#475569">Real-time</text>
    <circle r="2.5" fill="#f59e0b" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 810 100" to="360 810 100" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="856;856" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;100" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bottom labels -->
  <line x1="90" y1="42" x2="810" y2="42" stroke="url(#tg)" stroke-width="0.5" stroke-opacity="0.2">
    <animate attributeName="stroke-opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Category labels -->
  <rect x="55" y="180" width="280" height="14" rx="3" fill="#0e7490" fill-opacity="0.1"/>
  <text x="195" y="191" text-anchor="middle" font-size="7" fill="#21d5ed" letter-spacing="2" class="mono">FRONTEND</text>

  <rect x="525" y="180" width="200" height="14" rx="3" fill="#a855f7" fill-opacity="0.1"/>
  <text x="625" y="191" text-anchor="middle" font-size="7" fill="#a855f7" letter-spacing="2" class="mono">BACKEND</text>
</svg>
