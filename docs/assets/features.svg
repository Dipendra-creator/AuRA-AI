<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#070b14"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21d5ed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes pulse{0%,100%{stroke-opacity:.3}50%{stroke-opacity:.8}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    @keyframes glow{0%,100%{opacity:.4}50%{opacity:1}}
    .fp{animation:float 4s ease-in-out infinite}
    .gp{animation:glow 3s ease-in-out infinite}
    .cp{animation:pulse 3s ease-in-out infinite}
    text{font-family:'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif}
    .mono{font-family:'SF Mono','Fira Code','Cascadia Code',monospace}
  </style>

  <rect width="900" height="160" fill="url(#bg)" rx="12"/>
  <rect x="1" y="1" width="898" height="158" rx="12" fill="none" stroke="url(#tg)" stroke-width="0.5" stroke-opacity="0.1">
    <animate attributeName="stroke-opacity" values="0.06;0.15;0.06" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Feature 1: Document Processing -->
  <g transform="translate(30,20)" class="fp">
    <rect width="200" height="120" rx="10" fill="#111b2e" stroke="#21d5ed" stroke-width="0.6" class="cp"/>
    <text x="100" y="38" text-anchor="middle" font-size="28">📄</text>
    <text x="100" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#21d5ed">Document Processing</text>
    <text x="100" y="80" text-anchor="middle" font-size="7.5" fill="#94a3b8">Multi-format upload</text>
    <text x="100" y="94" text-anchor="middle" font-size="7.5" fill="#94a3b8">OCR + AI extraction</text>
    <text x="100" y="108" text-anchor="middle" font-size="7.5" fill="#94a3b8">Schema-based parsing</text>
  </g>

  <!-- Feature 2: AI Assistant -->
  <g transform="translate(245,20)" class="fp" style="animation-delay:0.5s">
    <rect width="200" height="120" rx="10" fill="#111b2e" stroke="#a855f7" stroke-width="0.6" class="cp" style="animation-delay:0.5s"/>
    <text x="100" y="38" text-anchor="middle" font-size="28">🤖</text>
    <text x="100" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#c084fc">AI Assistant</text>
    <text x="100" y="80" text-anchor="middle" font-size="7.5" fill="#94a3b8">ChatGPT-style interface</text>
    <text x="100" y="94" text-anchor="middle" font-size="7.5" fill="#94a3b8">Document Q&amp;A</text>
    <text x="100" y="108" text-anchor="middle" font-size="7.5" fill="#94a3b8">Persistent sessions</text>
  </g>

  <!-- Feature 3: Workflow Builder -->
  <g transform="translate(460,20)" class="fp" style="animation-delay:1s">
    <rect width="200" height="120" rx="10" fill="#111b2e" stroke="#f59e0b" stroke-width="0.6" class="cp" style="animation-delay:1s"/>
    <text x="100" y="38" text-anchor="middle" font-size="28">⚡</text>
    <text x="100" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#fbbf24">Workflow Builder</text>
    <text x="100" y="80" text-anchor="middle" font-size="7.5" fill="#94a3b8">Drag-and-drop canvas</text>
    <text x="100" y="94" text-anchor="middle" font-size="7.5" fill="#94a3b8">9 node types (DAG)</text>
    <text x="100" y="108" text-anchor="middle" font-size="7.5" fill="#94a3b8">Real-time execution</text>
  </g>

  <!-- Feature 4: Dashboard -->
  <g transform="translate(675,20)" class="fp" style="animation-delay:1.5s">
    <rect width="200" height="120" rx="10" fill="#111b2e" stroke="#34d399" stroke-width="0.6" class="cp" style="animation-delay:1.5s"/>
    <text x="100" y="38" text-anchor="middle" font-size="28">📊</text>
    <text x="100" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#34d399">Dashboard</text>
    <text x="100" y="80" text-anchor="middle" font-size="7.5" fill="#94a3b8">Real-time analytics</text>
    <text x="100" y="94" text-anchor="middle" font-size="7.5" fill="#94a3b8">Accuracy charts</text>
    <text x="100" y="108" text-anchor="middle" font-size="7.5" fill="#94a3b8">Activity timeline</text>
  </g>
</svg>
